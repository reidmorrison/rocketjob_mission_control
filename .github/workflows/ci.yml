name: build

on:
  - push
  - pull_request

jobs:
  test:
    name: "Test: Rails ${{ matrix.rails }} on Ruby ${{ matrix.ruby }}"
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo
        ports:
          - 27017:27017
    strategy:
      fail-fast: false
      matrix:
        include:
          - rails: "7.2"
            ruby: "3.2"
          - rails: "8.0"
            ruby: "3.4"
          - rails: "8.1"
            ruby: "4.0"
    env:
      BUNDLE_GEMFILE: gemfiles/rails_${{ matrix.rails }}.gemfile
      DISPLAY: ":99.0"

    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          # runs 'bundle install' and caches installed gems automatically
          bundler-cache: true

      - name: Gemfile
        run: echo $BUNDLE_GEMFILE

      - name: Ruby Version
        run: ruby --version

      - name: Run Tests
        run: bundle exec rake test

  lint:
    name: "Lint: RuboCop and bundler-audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop --parallel

      - name: bundler-audit
        run: bundle exec bundle-audit check --update
